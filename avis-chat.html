<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVIS 艾維士 AI 客服助理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', sans-serif; background: #f5f5f3; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
#app { display: flex; flex-direction: column; height: 620px; width: 100%; max-width: 680px; border: 1px solid #e0e0dc; border-radius: 16px; overflow: hidden; background: #fff; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
#header { padding: 14px 18px; border-bottom: 1px solid #ebebeb; display: flex; align-items: center; justify-content: space-between; background: #fff; }
#header-left { display: flex; align-items: center; gap: 10px; }
#avatar { width: 36px; height: 36px; border-radius: 50%; background: #1D9E75; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #fff; flex-shrink: 0; }
#header-title { font-size: 15px; font-weight: 600; color: #1a1a1a; }
#header-sub { font-size: 12px; color: #888; margin-top: 1px; }
#clear-btn { font-size: 12px; color: #888; background: none; border: 1px solid #ddd; border-radius: 8px; padding: 5px 12px; cursor: pointer; }
#clear-btn:hover { background: #f5f5f5; }
#messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
.msg { display: flex; gap: 8px; max-width: 88%; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.user .bubble { background: #1D9E75; color: #fff; border-radius: 18px 18px 4px 18px; }
.msg.bot { align-self: flex-start; }
.msg.bot .bubble { background: #f5f5f3; color: #1a1a1a; border-radius: 18px 18px 18px 4px; border: 1px solid #ebebeb; }
.bubble { padding: 10px 14px; font-size: 14px; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
.bot-avatar { width: 30px; height: 30px; border-radius: 50%; background: #1D9E75; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #fff; flex-shrink: 0; margin-top: 2px; }
.typing { display: flex; align-items: center; gap: 4px; padding: 12px 14px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #aaa; animation: blink 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100%{opacity:0.3} 40%{opacity:1} }
#input-area { padding: 12px 14px; border-top: 1px solid #ebebeb; display: flex; gap: 8px; align-items: flex-end; background: #fff; }
#user-input { flex: 1; border: 1px solid #ddd; border-radius: 10px; padding: 9px 12px; font-size: 14px; font-family: inherit; color: #1a1a1a; background: #fafafa; resize: none; min-height: 38px; max-height: 100px; line-height: 1.5; }
#user-input:focus { outline: none; border-color: #1D9E75; background: #fff; }
#user-input::placeholder { color: #bbb; }
#send-btn { background: #1D9E75; color: #fff; border: none; border-radius: 10px; padding: 9px 18px; font-size: 14px; font-family: inherit; cursor: pointer; flex-shrink: 0; }
#send-btn:hover { background: #0F6E56; }
#send-btn:disabled { opacity: 0.45; cursor: not-allowed; }
.notice { font-size: 11px; color: #bbb; text-align: center; padding: 6px 0 2px; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-left">
      <div id="avatar">AI</div>
      <div>
        <div id="header-title">AVIS 艾維士 智能客服</div>
        <div id="header-sub">AI Assistant · 中英文皆可詢問</div>
      </div>
    </div>
    <button id="clear-btn">清除對話</button>
  </div>
  <div id="messages">
    <div class="msg bot">
      <div class="bot-avatar">A</div>
      <div class="bubble">您好！我是 AVIS 艾維士的 AI 助理，可以幫您查詢服務據點、營業時間、客服專線等資訊。請問有什麼可以幫您的？

Hi! I'm the AVIS AI assistant. Feel free to ask me anything in Chinese or English.</div>
    </div>
  </div>
  <p class="notice">Enter 送出 · Shift+Enter 換行</p>
  <div id="input-area">
    <textarea id="user-input" placeholder="請輸入您的問題... / Ask me anything..." rows="1"></textarea>
    <button id="send-btn">送出</button>
  </div>
</div>
<script>
const WORKER_URL = 'https://avis-proxy.tina6393777.workers.dev';
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const clearBtn = document.getElementById('clear-btn');
let chatHistory = [];

const KNOWLEDGE = `=== AVIS 艾維士 服務據點資料 ===

【高雄 2個據點】
1. 左營高鐵站
   地址：高雄市左營區高鐵路680號

   營業時間：平日(週一~週四) 09:00-18:00 假日(週五~週日) 09:00-20:00

2. 小港機場站
   地址：高雄市小港區沿海一路62號
   電話：(02) 6620-6620
   營業時間：平日(週一~週四) 09:00-18:00 假日(週五~週日) 09:00-20:00

【台南】
3. 台南高鐵站
   地址：台南市歸仁區高鐵一路2號
   電話：0800-600-601
   營業時間：08:00-20:00

【嘉義】
4. 嘉義高鐵站
   地址：嘉義縣太保市保鐵七路200號
   電話：(02) 6620-6620
   營業時間：09:00-18:00

【台中】
5. 台中建國服務站 地址：台中市西區建國路71號 電話：(02) 6620-6620 營業時間：每日 08:30-20:30
6. 台中高鐵站 地址：台中市烏日區高鐵三路17號 電話：(02) 6620-6620 營業時間：每日 08:00-20:00
7. 台中市府站 地址：台中市西屯區台灣大道二段901號 電話：(02) 6620-6620 營業時間：每日 08:00-20:00

【新竹】
8. 新竹高鐵站 地址：新竹縣竹北市文興路2段248號 電話：(02) 6620-6660 營業時間：每日 08:00-20:00

【桃園】
9. 桃園國際機場站(第二航廈) 地址：桃園市大園區航站南路9號 電話：(02) 6620-6620轉113 營業時間：每日 08:00-20:00

【台北北部】
10. 台北士林服務站 地址：台北市北投區承德路六段80號 電話：(02) 6620-6620 營業時間：平日09:00-18:00 假日09:00-20:00
11. 台北內湖服務站 地址：台北市內湖區民權東路六段13-9號 電話：(02) 6620-6620 營業時間：每日 08:30-20:30
12. 松山機場站 地址：台北市松山區復興北路497號 電話：02-6620-6620 營業時間：每日 08:00-20:00
13. 台北南港服務站 地址：台北市南港區市民大道七段396號 電話：(02) 6620-6620 營業時間：每日 08:30-20:30
14. 板橋服務站 地址：新北市板橋區板新路202號 電話：02-6620-6620 營業時間：每日 08:00-20:00

【花東】
15. 花蓮國聯站 地址：花蓮縣花蓮市國聯五路212號 電話：(02) 6620-6620 營業時間：08:30-20:30
16. 台東台鐵站 地址：台東縣台東市新站路225號 電話：02-6620-6620 營業時間：08:30-20:30

【離島】
17. 澎湖機場站 地址：澎湖縣湖西鄉隘門村126-5號 電話：(02) 6620-6620 營業時間：07:30-19:30
18. 金門機場站 地址：金門縣金寧鄉尚義機場二號 電話：(02) 6620-6620 營業時間：08:30-18:30

【客服專線】
國內免費：0800-600-601
海外撥打：+886 2 6620-6620
服務時間：24小時中英文客服`;

function buildSystemPrompt() {
  return '你是 AVIS 艾維士（台灣租車／專車司機服務公司）的內部 AI 客服助理，協助同仁查詢內部知識與作業流程。\n風格：親切專業，繁體中文為主，可夾雜英文術語，回答簡潔有重點。\n原則：優先根據知識庫回答；知識庫未涵蓋時補充一般常識但加註「AI 補充資訊，請向主管確認」；完全不確定時誠實說明。\n\n' + KNOWLEDGE;
}

function addMessage(role, text) {
  const msg = document.createElement('div');
  msg.className = 'msg ' + role;
  if (role === 'bot') { const av = document.createElement('div'); av.className = 'bot-avatar'; av.textContent = 'A'; msg.appendChild(av); }
  const bubble = document.createElement('div'); bubble.className = 'bubble'; bubble.textContent = text;
  msg.appendChild(bubble); messagesEl.appendChild(msg); messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  const msg = document.createElement('div'); msg.className = 'msg bot'; msg.id = 'typing-indicator';
  const av = document.createElement('div'); av.className = 'bot-avatar'; av.textContent = 'A';
  const bubble = document.createElement('div'); bubble.className = 'bubble typing';
  bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  msg.appendChild(av); msg.appendChild(bubble); messagesEl.appendChild(msg); messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() { const t = document.getElementById('typing-indicator'); if (t) t.remove(); }

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || sendBtn.disabled) return;
  inputEl.value = ''; inputEl.style.height = 'auto'; sendBtn.disabled = true;
  addMessage('user', text); chatHistory.push({ role: 'user', content: text }); showTyping();
  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: buildSystemPrompt(), messages: chatHistory })
    });
    if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.error?.message || 'API 錯誤'); }
    const data = await res.json();
    const reply = data.content?.[0]?.text || '抱歉，無法取得回應，請稍後再試。';
    removeTyping(); addMessage('bot', reply); chatHistory.push({ role: 'assistant', content: reply });
  } catch(e) { removeTyping(); addMessage('bot', '連線異常：' + (e.message || '請稍後再試')); }
  sendBtn.disabled = false; inputEl.focus();
}

sendBtn.addEventListener('click', sendMessage);
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
inputEl.addEventListener('input', () => { inputEl.style.height = 'auto'; inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px'; });
clearBtn.addEventListener('click', () => { chatHistory = []; messagesEl.innerHTML = ''; addMessage('bot', '對話已清除！有什麼新問題嗎？\n\nChat cleared! What can I help you with?'); });
</script>
</body>
</html>
